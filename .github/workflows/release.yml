name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*' # Se ejecuta automáticamente cuando creas un tag como v1.0.2

permissions:
  contents: write  # Necesario para crear Releases y subir instaladores

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar dependencias del sistema (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 ruby ruby-dev build-essential rpm dpkg
          sudo gem install --no-document fpm

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci

      - name: Construir y Publicar (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win

      - name: Construir y Publicar (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:mac

      - name: Construir y Publicar (Linux)
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: "true"
        run: npm run release:linux
