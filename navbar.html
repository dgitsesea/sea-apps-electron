<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e1e;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            height: 50px;
            overflow: hidden;
            border-bottom: 1px solid #333;
            user-select: none;
            -webkit-app-region: drag; /* Permite arrastrar la ventana desde aquí */
        }
        .nav-container {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 0 10px;
            gap: 5px;
            align-items: center;
            -webkit-app-region: no-drag; /* Los botones no arrastran */
        }
        button {
            background: transparent;
            border: none;
            color: #cccccc;
            font-size: 13px;
            font-weight: 500;
            /* Cursor personalizado: Lupa pequeña con detalle de flecha */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="%230078d4" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/><path fill="%23ffffff" d="M12 9l3-3m0 0l3 3m-3-3v8" stroke="%23ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>') 16 16, pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 36px;
            position: relative;
            overflow: hidden;
        }
        button:hover {
            background-color: #333333;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 120, 212, 0.5); /* Efecto de brillo azul */
            transform: translateY(-1px);
        }
        button.active {
            background-color: #0078d4; /* Azul moderno */
            color: white;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.4);
        }
        .spacer {
            flex-grow: 1;
        }
        .reload-btn {
            background-color: #2d2d2d;
            border: 1px solid #444;
        }
        .reload-btn:hover {
            background-color: #444;
        }
        .support-btn {
            background-color: rgba(0, 120, 212, 0.15);
            border: 1px solid rgba(0, 120, 212, 0.4);
            color: #4fc3f7;
        }
        .support-btn:hover {
            background-color: #0078d4;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(0, 120, 212, 0.6);
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <button onclick="navigate('https://sistemaestatalanticorrupcion.guanajuato.gob.mx/', this)">SEA Guanajuato</button>
        <button onclick="navigate('https://sistemaestatalanticorrupcion.guanajuato.gob.mx/mesa-de-ayuda/', this)">Mesa de Ayuda SEA</button>
        <button onclick="navigate('https://seseaguanajuato.org/', this)">SESEA Guanajuato</button>
        <button onclick="navigate('https://publico.seseaguanajuato.org/', this)">Portal Público</button>
        <button onclick="navigate('https://plataformadigital.guanajuato.gob.mx/', this)" class="active">Plataforma Digital</button>
        <button onclick="navigate('https://intranet.seseaguanajuato.org/', this)">Intranet SESEA</button>
        <button class="support-btn" onclick="openTiSupport()">📞 Soporte TI</button>
        
        <div class="spacer"></div>
        <button class="reload-btn" onclick="reloadView()">🔄 Recargar</button>
    </div>
    <script>
        function navigate(url, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            window.api.navigate(url);
        }
        function reloadView() {
            window.api.reload();
        }
        function openTiSupport() {
            window.api.openTiSupport();
        }
        
        // Cargar botón activo inicial
        window.api.getLastUrl().then(url => {
            if (!url) return;
            let bestMatch = null;
            let longestLength = 0;
            document.querySelectorAll('button').forEach(b => {
                b.classList.remove('active');
                const onclickAttr = b.getAttribute('onclick');
                if (!onclickAttr) return;
                const match = onclickAttr.match(/navigate\('([^']+)'/);
                if (match && match[1]) {
                    const btnUrl = match[1];
                    if (url.startsWith(btnUrl) && btnUrl.length > longestLength) {
                        bestMatch = b;
                        longestLength = btnUrl.length;
                    }
                }
            });
            if (bestMatch) bestMatch.classList.add('active');
        });
    </script>
</body>
</html>
