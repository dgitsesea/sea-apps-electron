<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Recursos Digitales SEA</title>

    <style>
        :root {
            --topbar-bg: #181818;
            --topbar-border: #2b2b2b;
            --topbar-text: #cccccc;
            --topbar-muted: #8a8a8a;
            --topbar-hover: #2a2d2e;
            --topbar-active: #37373d;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 50px;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: var(--topbar-bg);
            color: var(--topbar-text);
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .drag-region {
            position: fixed;
            inset: 0;
            height: 50px;
            -webkit-app-region: drag;
            z-index: 1;
        }

        .topbar {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: auto auto minmax(180px, 1fr) auto;
            align-items: center;
            gap: 10px;
            width: 100%;
            height: 50px;
            padding: 0 8px;
            border-bottom: 1px solid var(--topbar-border);
            -webkit-app-region: no-drag;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            height: 34px;
            padding: 0 7px;
            white-space: nowrap;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 22px;
            height: 22px;
            border-radius: 5px;
            background: #007acc;
            color: #ffffff;
            font-size: 13px;
            font-weight: 800;
        }

        .brand-name {
            max-width: 175px;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f2f2f2;
            font-size: 13px;
            font-weight: 600;
        }

        .version-pill {
            color: var(--topbar-muted);
            font-size: 11px;
            font-weight: 600;
        }

        .menu-bar {
            display: flex;
            align-items: center;
            gap: 2px;
            min-width: 0;
        }

        button {
            border: 0;
            cursor: pointer;
            font-family: inherit;
        }

        .menu-trigger,
        .icon-button {
            height: 32px;
            border-radius: 5px;
            background: transparent;
            color: var(--topbar-text);
            font-size: 13px;
        }

        .menu-trigger {
            padding: 0 10px;
        }

        .menu-trigger:hover,
        .menu-trigger.active,
        .icon-button:hover {
            background: var(--topbar-hover);
            color: #ffffff;
        }

        .menu-trigger.active {
            background: var(--topbar-active);
        }

        .command-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            height: 32px;
            padding: 0 12px;
            border: 1px solid #3c3c3c;
            border-radius: 7px;
            background: #1f1f1f;
            color: var(--topbar-text);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .command-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
        }

        .update-status {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--topbar-muted);
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.16s ease;
        }

        .update-status.visible {
            opacity: 1;
        }

        .icon-button {
            display: grid;
            place-items: center;
            width: 32px;
            min-width: 32px;
            padding: 0;
            font-size: 16px;
        }

        .support-button,
        .restart-update-button {
            width: auto;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .restart-update-button {
            display: none;
            background: #0e639c;
            color: #ffffff;
        }

        .restart-update-button.visible {
            display: grid;
        }

        .restart-update-button:hover {
            background: #1177bb;
        }

        @media (max-width: 900px) {
            .topbar {
                grid-template-columns: auto auto minmax(120px, 1fr) auto;
                gap: 6px;
            }

            .brand-name,
            .version-pill,
            .update-status,
            .support-button {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="drag-region"></div>

    <div class="topbar">
        <div class="brand" title="Recursos Digitales SEA">
            <span class="brand-mark">R</span>
            <span class="brand-name">Recursos Digitales SEA</span>
            <span id="version-badge" class="version-pill">v...</span>
        </div>

        <nav id="menu-bar" class="menu-bar" aria-label="Menú principal"></nav>

        <div class="command-pill" title="Sistema actual">
            <span id="active-page-label" class="command-label">Sistema actual</span>
        </div>

        <div class="actions">
            <span id="update-status" class="update-status" aria-live="polite"></span>
            <button id="restart-update-button" class="icon-button restart-update-button" type="button" title="Reiniciar y actualizar">
                Reiniciar y actualizar
            </button>
            <button id="support-button" class="icon-button support-button" type="button" title="Soporte TI">Soporte TI</button>
            <button id="reload-button" class="icon-button" type="button" title="Recargar página" aria-label="Recargar página">↻</button>
        </div>
    </div>

    <script>
        const MENU_GROUPS = [
            {
                id: 'recursos',
                label: 'Recursos',
                items: [
                    {
                        label: 'SEA Guanajuato',
                        url: 'https://sistemaestatalanticorrupcion.guanajuato.gob.mx/'
                    },
                    {
                        label: 'SESEA Guanajuato',
                        url: 'https://seseaguanajuato.org/'
                    },
                    {
                        label: 'Portal Público',
                        url: 'https://publico.seseaguanajuato.org/'
                    }
                ]
            },
            {
                id: 'sistemas',
                label: 'Sistemas',
                items: [
                    {
                        label: 'Plataforma Digital',
                        url: 'https://plataformadigital.guanajuato.gob.mx/'
                    },
                    {
                        label: 'Intranet SESEA',
                        url: 'https://intranet.seseaguanajuato.org/'
                    }
                ]
            },
            {
                id: 'soporte',
                label: 'Soporte',
                items: [
                    {
                        label: 'Mesa de Ayuda SEA',
                        url: 'https://sistemaestatalanticorrupcion.guanajuato.gob.mx/mesa-de-ayuda/'
                    }
                ]
            },
            {
                id: 'actualizacion',
                label: 'Actualización',
                items: []
            }
        ];

        const menuBar = document.getElementById('menu-bar');
        const activePageLabel = document.getElementById('active-page-label');
        let activeUrl = '';

        const SYSTEM_LABELS = [
            {
                label: 'Mesa de Ayuda PDE',
                origin: 'https://mesadeayuda.seseaguanajuato.org'
            },
            {
                label: 'Plataforma Digital',
                origin: 'https://plataformadigital.guanajuato.gob.mx'
            },
            {
                label: 'Intranet SESEA',
                origin: 'https://intranet.seseaguanajuato.org'
            },
            {
                label: 'Login SESEA',
                origin: 'https://login.seseaguanajuato.org'
            },
            {
                label: 'Login SESEA Dev',
                origin: 'https://devlogin.seseaguanajuato.org'
            },
            {
                label: 'SIREG',
                origin: 'https://sireg.seseaguanajuato.org'
            },
            {
                label: 'SIREG Dev',
                origin: 'https://devsireg.seseaguanajuato.org'
            },
            {
                label: 'SEA Guanajuato',
                origin: 'https://sistemaestatalanticorrupcion.guanajuato.gob.mx'
            },
            {
                label: 'SESEA Guanajuato',
                origin: 'https://seseaguanajuato.org'
            },
            {
                label: 'Portal Público',
                origin: 'https://publico.seseaguanajuato.org'
            }
        ];

        const allNavigationItems = () => MENU_GROUPS
            .flatMap(group => group.items)
            .filter(item => item.url);

        const findBestNavItem = (url) => {
            let bestMatch = null;
            let longestLength = 0;

            allNavigationItems().forEach(item => {
                if (url && url.startsWith(item.url) && item.url.length > longestLength) {
                    bestMatch = item;
                    longestLength = item.url.length;
                }
            });

            return bestMatch;
        };

        const getSystemLabel = (url) => {
            const activeItem = findBestNavItem(url);
            if (activeItem) return activeItem.label;

            try {
                const parsedUrl = new URL(url);
                const system = SYSTEM_LABELS.find(item => item.origin === parsedUrl.origin);
                if (system) return system.label;

                return parsedUrl.hostname.replace(/^www\./, '');
            } catch {
                return 'Sistema actual';
            }
        };

        const setActiveMenuGroup = (activeItem) => {
            document.querySelectorAll('.menu-trigger').forEach(button => {
                const group = MENU_GROUPS.find(item => item.id === button.dataset.groupId);
                const isActive = activeItem && group && group.items.includes(activeItem);
                button.classList.toggle('active', Boolean(isActive));
            });
        };

        const setActiveByUrl = (url) => {
            activeUrl = url || '';
            const activeItem = findBestNavItem(activeUrl);
            activePageLabel.textContent = getSystemLabel(activeUrl);
            setActiveMenuGroup(activeItem);
        };

        const openNativeMenu = (groupId, triggerButton) => {
            const bounds = triggerButton.getBoundingClientRect();
            window.api.openAppMenu(groupId, {
                x: bounds.left,
                y: bounds.bottom
            });
        };

        const showUpdateStatus = (status) => {
            const updateStatus = document.getElementById('update-status');
            const restartUpdateButton = document.getElementById('restart-update-button');

            if (!status || !status.message) return;

            updateStatus.textContent = status.message;
            updateStatus.classList.add('visible');
            restartUpdateButton.classList.toggle('visible', Boolean(status.canRestart));

            if (!['checking', 'downloading', 'downloaded'].includes(status.status)) {
                setTimeout(() => {
                    updateStatus.classList.remove('visible');
                }, 5000);
            }
        };

        const restartAndUpdate = async () => {
            const status = await window.api.restartAndUpdate();
            showUpdateStatus(status);
        };

        const renderMenuBar = () => {
            menuBar.innerHTML = '';

            MENU_GROUPS.forEach(group => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'menu-trigger';
                button.textContent = group.label;
                button.dataset.groupId = group.id;
                button.addEventListener('click', () => openNativeMenu(group.id, button));
                menuBar.appendChild(button);
            });
        };

        renderMenuBar();

        document.getElementById('support-button').addEventListener('click', () => {
            window.api.openTiSupport();
        });

        document.getElementById('restart-update-button').addEventListener('click', restartAndUpdate);

        document.getElementById('reload-button').addEventListener('click', () => {
            window.api.reload();
        });

        window.api.getLastUrl().then(setActiveByUrl);

        window.api.onNavigationState(state => {
            setActiveByUrl(state && state.url);
        });

        window.api.getAppVersion().then(version => {
            if (!version) return;
            document.title = `Recursos Digitales SEA v${version}`;
            document.getElementById('version-badge').textContent = `v${version}`;
        });

        window.api.onUpdateStatus(showUpdateStatus);
    </script>
</body>

</html>
