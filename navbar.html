<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Recursos Digitales SEA</title>

    <style>
        :root {
            --navbar-text-color: #ffffff;
            --active-button-text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 50px;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #387c92;
            border-bottom: 1px solid rgba(0, 0, 0, 0.28);
            color: var(--navbar-text-color);
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.25s ease;
        }

        .drag-region {
            position: fixed;
            inset: 0;
            height: 50px;
            -webkit-app-region: drag;
            z-index: 1;
        }

        .topbar {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: minmax(188px, auto) minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            width: 100%;
            height: 50px;
            padding: 7px 10px;
            -webkit-app-region: no-drag;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            height: 36px;
            padding: 0 10px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.16);
            white-space: nowrap;
        }

        .brand-name {
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            font-weight: 700;
        }

        .version-pill {
            flex: 0 0 auto;
            padding: 3px 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            font-size: 11px;
            font-weight: 700;
        }

        .nav-strip {
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }

        .nav-strip::-webkit-scrollbar {
            display: none;
        }

        button {
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
        }

        .nav-link {
            flex: 0 0 auto;
            height: 36px;
            padding: 0 11px;
            background: transparent;
            color: var(--navbar-text-color);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .nav-link.active {
            background: rgba(0, 0, 0, 0.44);
            color: var(--active-button-text-color);
            box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.8);
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn {
            height: 36px;
            min-width: 36px;
            padding: 0 11px;
            background: rgba(0, 0, 0, 0.22);
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
        }

        .action-btn:hover {
            background: rgba(0, 0, 0, 0.36);
        }

        .support-btn {
            background: #92387c;
        }

        .support-btn:hover {
            background: #7c9238;
        }

        .update-btn {
            background: rgba(255, 255, 255, 0.18);
        }

        .update-btn.checking {
            cursor: progress;
            opacity: 0.78;
        }

        .reload-btn {
            padding: 0;
            font-size: 19px;
            line-height: 1;
        }

        .update-status {
            max-width: 230px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--navbar-text-color);
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.18s ease;
        }

        .update-status.visible {
            opacity: 0.92;
        }
    </style>
</head>

<body>
    <div class="drag-region"></div>

    <div class="topbar">
        <div class="brand" title="Recursos Digitales SEA">
            <span class="brand-name">Recursos Digitales SEA</span>
            <span id="version-badge" class="version-pill">v...</span>
        </div>

        <nav id="nav-strip" class="nav-strip" aria-label="Aplicaciones SEA"></nav>

        <div class="actions">
            <span id="update-status" class="update-status" aria-live="polite"></span>
            <button id="update-button" class="action-btn update-btn" type="button" title="Buscar actualizaciones">
                Buscar actualización
            </button>
            <button id="support-button" class="action-btn support-btn" type="button">
                Soporte TI
            </button>
            <button id="reload-button" class="action-btn reload-btn" type="button" aria-label="Recargar página" title="Recargar página">
                ↻
            </button>
        </div>
    </div>

    <script>
        const NAV_ITEMS = [
            {
                label: 'SEA Guanajuato',
                url: 'https://sistemaestatalanticorrupcion.guanajuato.gob.mx/'
            },
            {
                label: 'Mesa de Ayuda SEA',
                url: 'https://sistemaestatalanticorrupcion.guanajuato.gob.mx/mesa-de-ayuda/'
            },
            {
                label: 'SESEA Guanajuato',
                url: 'https://seseaguanajuato.org/'
            },
            {
                label: 'Portal Público',
                url: 'https://publico.seseaguanajuato.org/'
            },
            {
                label: 'Plataforma Digital',
                url: 'https://plataformadigital.guanajuato.gob.mx/'
            },
            {
                label: 'Intranet SESEA',
                url: 'https://intranet.seseaguanajuato.org/'
            }
        ];

        const navStrip = document.getElementById('nav-strip');

        const parseColor = (value) => {
            if (!value || typeof value !== 'string') return null;
            value = value.trim();

            const rgbMatch = value.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
            if (rgbMatch) {
                return {
                    r: Number(rgbMatch[1]),
                    g: Number(rgbMatch[2]),
                    b: Number(rgbMatch[3])
                };
            }

            const hexMatch = value.match(/^#([a-f0-9]{3}|[a-f0-9]{6})$/i);
            if (hexMatch) {
                let hex = hexMatch[1];
                if (hex.length === 3) {
                    hex = hex.split('').map(c => c + c).join('');
                }
                return {
                    r: parseInt(hex.substr(0, 2), 16),
                    g: parseInt(hex.substr(2, 2), 16),
                    b: parseInt(hex.substr(4, 2), 16)
                };
            }

            return null;
        };

        const contrastColor = (background) => {
            const rgb = parseColor(background);
            if (!rgb) return '#ffffff';

            const normalize = (value) => {
                const channel = value / 255;
                return channel <= 0.03928
                    ? channel / 12.92
                    : Math.pow((channel + 0.055) / 1.055, 2.4);
            };

            const lum = 0.2126 * normalize(rgb.r) + 0.7152 * normalize(rgb.g) + 0.0722 * normalize(rgb.b);
            return lum > 0.55 ? '#111111' : '#ffffff';
        };

        const updateButtonTextColors = () => {
            const navbarBg = document.body.style.backgroundColor || window.getComputedStyle(document.body).backgroundColor;
            const baseText = contrastColor(navbarBg);
            document.documentElement.style.setProperty('--navbar-text-color', baseText);
            document.documentElement.style.setProperty('--active-button-text-color', '#ffffff');
        };

        const setActiveByUrl = (url) => {
            let bestMatch = null;
            let longestLength = 0;

            document.querySelectorAll('.nav-link').forEach(button => {
                button.classList.remove('active');
                const buttonUrl = button.dataset.url;

                if (url && url.startsWith(buttonUrl) && buttonUrl.length > longestLength) {
                    bestMatch = button;
                    longestLength = buttonUrl.length;
                }
            });

            if (bestMatch) {
                bestMatch.classList.add('active');
                bestMatch.scrollIntoView({ inline: 'nearest', block: 'nearest' });
            }
        };

        const navigate = (url) => {
            setActiveByUrl(url);
            window.api.navigate(url);
        };

        const reloadView = () => {
            window.api.reload();
        };

        const openTiSupport = () => {
            window.api.openTiSupport();
        };

        const showUpdateStatus = (status) => {
            const updateStatus = document.getElementById('update-status');
            const updateButton = document.getElementById('update-button');

            if (!status || !status.message) return;

            updateStatus.textContent = status.message;
            updateStatus.classList.add('visible');
            updateButton.classList.toggle('checking', status.status === 'checking');
            updateButton.disabled = status.status === 'checking';

            if (!['checking', 'downloading'].includes(status.status)) {
                setTimeout(() => {
                    updateStatus.classList.remove('visible');
                }, 5000);
            }
        };

        const checkForUpdates = async () => {
            const updateButton = document.getElementById('update-button');
            updateButton.disabled = true;
            updateButton.classList.add('checking');
            showUpdateStatus({
                status: 'checking',
                message: 'Buscando actualizaciones...'
            });

            const status = await window.api.checkForUpdates();
            showUpdateStatus(status);

            if (status.status !== 'checking') {
                updateButton.disabled = false;
                updateButton.classList.remove('checking');
            }
        };

        const renderNavigation = () => {
            navStrip.innerHTML = '';

            NAV_ITEMS.forEach(item => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'nav-link';
                button.textContent = item.label;
                button.title = item.label;
                button.dataset.url = item.url;
                button.addEventListener('click', () => navigate(item.url));
                navStrip.appendChild(button);
            });
        };

        renderNavigation();

        document.getElementById('update-button').addEventListener('click', checkForUpdates);
        document.getElementById('support-button').addEventListener('click', openTiSupport);
        document.getElementById('reload-button').addEventListener('click', reloadView);

        window.api.onNavbarThemeColor(color => {
            if (!color) return;
            document.body.style.backgroundColor = color;
            updateButtonTextColors();
        });

        window.api.getLastUrl().then(url => {
            setActiveByUrl(url);
            updateButtonTextColors();
        });

        window.api.getAppVersion().then(version => {
            if (!version) return;
            document.title = `Recursos Digitales SEA v${version}`;
            document.getElementById('version-badge').textContent = `v${version}`;
        });

        window.api.onUpdateStatus(status => {
            showUpdateStatus(status);
            if (status && status.status !== 'checking') {
                const updateButton = document.getElementById('update-button');
                updateButton.disabled = false;
                updateButton.classList.remove('checking');
            }
        });
    </script>
</body>

</html>
