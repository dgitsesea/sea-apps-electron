<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <style>
        /* ================================= */
        /* CURSOR GLOBAL */
        /* ================================= */

        html,
        body,
        button,
        .nav-container,
        * {
            cursor:
                pointer;
        }

        body {
            margin: 0;
            padding: 0;

            background-color: #387c92;

            font-family:
                'Segoe UI',
                Roboto,
                Helvetica,
                Arial,
                sans-serif;

            display: flex;
            align-items: center;

            height: 50px;

            overflow: hidden;

            border-bottom: 1px solid #333;

            user-select: none;

            -webkit-user-select: none;
        }

        /* ================================= */
        /* REGIÓN DRAGGABLE */
        /* ================================= */

        .drag-region {
            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 50px;

            -webkit-app-region: drag;

            z-index: 1;
        }

        /* ================================= */
        /* NAV */
        /* ================================= */

        .nav-container {
            position: relative;

            z-index: 2;

            display: flex;

            width: 100%;
            height: 100%;

            padding: 0 10px;

            gap: 5px;

            align-items: center;

            -webkit-app-region: no-drag;
        }

        button {
            background: transparent;

            border: none;

            color: #cccccc;

            font-size: 13px;
            font-weight: 500;

            padding: 8px 12px;

            border-radius: 6px;

            transition:
                all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);

            height: 36px;

            position: relative;

            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ================================= */
        /* EFECTOS BOTONES */
        /* ================================= */

        button::after {
            content: '';

            position: absolute;

            top: 0;
            left: -150%;

            width: 50%;
            height: 100%;

            background: linear-gradient(to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.25) 50%,
                    rgba(255, 255, 255, 0) 100%);

            transform: skewX(-25deg);

            pointer-events: none;
        }

        button:hover {
            background-color: #59c4e7;
            color: #ffffff;

            box-shadow:
                0 0 12px rgba(0, 120, 212, 0.3);

            transform:
                translateY(-1px) scale(1.02);
        }

        button:hover::after {
            left: 150%;

            transition:
                left 0.6s cubic-bezier(0.25,
                    0.8,
                    0.25,
                    1);
        }

        /* ================================= */
        /* BOTÓN ACTIVO */
        /* ================================= */

        button.active {
            background: #17343d;

            background-size: 300% 300%;

            animation:
                activeGradient 4s ease infinite;

            color: white;

            box-shadow:
                0 4px 14px rgba(0, 120, 212, 0.4);

            font-weight: 600;
        }

       

        .spacer {
            flex-grow: 1;
        }

        .reload-btn {
            background-color: #c3d8de;
            box-shadow:
                0 0 10px rgba(255, 255, 255, 0.1);
        }

        .reload-btn:hover {
            background-color: #444;

            box-shadow:
                0 0 10px rgba(255, 255, 255, 0.1);
        }

        .support-btn {
            background-color:
                #92387c;

            border:
                1px solid rgba(0, 120, 212, 0.4);

            color: #ffffff;
        }

        .support-btn:hover {
            background-color: #7c9238;

            color: #ffffff;

            box-shadow:
                0 0 14px rgba(0, 120, 212, 0.6);
        }

        /* ================================= */
        /* ANIMACIONES */
        /* ================================= */

        @keyframes activeGradient {

            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes pulseDot {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Región draggable -->
    <div class="drag-region"></div>

    <div class="nav-container">

        <button onclick="navigate('https://sistemaestatalanticorrupcion.guanajuato.gob.mx/', this)">
            SEA Guanajuato
        </button>

        <button onclick="navigate('https://sistemaestatalanticorrupcion.guanajuato.gob.mx/mesa-de-ayuda/', this)">
            Mesa de Ayuda SEA
        </button>

        <button onclick="navigate('https://seseaguanajuato.org/', this)">
            SESEA Guanajuato
        </button>

        <button onclick="navigate('https://publico.seseaguanajuato.org/', this)">
            Portal Público
        </button>

        <button onclick="navigate('https://plataformadigital.guanajuato.gob.mx/', this)" class="active">

            Plataforma Digital
        </button>

        <button onclick="navigate('https://intranet.seseaguanajuato.org/', this)">
            Intranet SESEA
        </button>

        

        <div class="spacer"></div>
        <button class="support-btn" onclick="openTiSupport()">
            Soporte TI
        </button>
        <button class="reload-btn" onclick="reloadView()">

            🔄
        </button>

    </div>

    <script>

        function navigate(url, btn) {

            document
                .querySelectorAll('button')
                .forEach(b => b.classList.remove('active'));

            if (btn) {
                btn.classList.add('active');
            }

            window.api.navigate(url);
        }

        function reloadView() {
            window.api.reload();
        }

        function openTiSupport() {
            window.api.openTiSupport();
        }

        /* ================================= */
        /* BOTÓN ACTIVO */
        /* ================================= */

        window.api.getLastUrl().then(url => {

            if (!url) return;

            let bestMatch = null;

            let longestLength = 0;

            document
                .querySelectorAll('button')
                .forEach(b => {

                    b.classList.remove('active');

                    const onclickAttr =
                        b.getAttribute('onclick');

                    if (!onclickAttr) return;

                    const match =
                        onclickAttr.match(
                            /navigate\('([^']+)'/
                        );

                    if (match && match[1]) {

                        const btnUrl = match[1];

                        if (
                            url.startsWith(btnUrl) &&
                            btnUrl.length > longestLength
                        ) {
                            bestMatch = b;
                            longestLength = btnUrl.length;
                        }
                    }
                });

            if (bestMatch) {
                bestMatch.classList.add('active');
            }
        });

    </script>

</body>

</html>
