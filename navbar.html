<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Recursos Digitales SEA</title>

    <style>
        :root {
            --topbar-bg: #181818;
            --topbar-border: #2b2b2b;
            --topbar-text: #cccccc;
            --topbar-muted: #8a8a8a;
            --topbar-hover: #2a2d2e;
            --topbar-active: #37373d;
            --menu-bg: #252526;
            --menu-border: #3c3c3c;
            --menu-shadow: rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 50px;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: var(--topbar-bg);
            color: var(--topbar-text);
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: height 0.12s ease;
        }

        body.menu-open {
            height: 260px;
        }

        .drag-region {
            position: fixed;
            inset: 0;
            height: 50px;
            -webkit-app-region: drag;
            z-index: 1;
        }

        .topbar {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: auto auto minmax(180px, 1fr) auto;
            align-items: center;
            gap: 10px;
            width: 100%;
            height: 50px;
            padding: 0 8px;
            border-bottom: 1px solid var(--topbar-border);
            -webkit-app-region: no-drag;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            height: 34px;
            padding: 0 7px;
            white-space: nowrap;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 22px;
            height: 22px;
            border-radius: 5px;
            background: #007acc;
            color: #ffffff;
            font-size: 13px;
            font-weight: 800;
        }

        .brand-name {
            max-width: 175px;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            font-weight: 600;
            color: #f2f2f2;
        }

        .version-pill {
            flex: 0 0 auto;
            color: var(--topbar-muted);
            font-size: 11px;
            font-weight: 600;
        }

        .menu-bar {
            display: flex;
            align-items: center;
            gap: 2px;
            min-width: 0;
        }

        button {
            border: 0;
            cursor: pointer;
            font-family: inherit;
        }

        .menu-trigger,
        .icon-button {
            height: 32px;
            border-radius: 5px;
            background: transparent;
            color: var(--topbar-text);
            font-size: 13px;
        }

        .menu-trigger {
            padding: 0 10px;
        }

        .menu-trigger:hover,
        .menu-trigger.open,
        .icon-button:hover {
            background: var(--topbar-hover);
            color: #ffffff;
        }

        .command-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            height: 32px;
            padding: 0 12px;
            border: 1px solid #3c3c3c;
            border-radius: 7px;
            background: #1f1f1f;
            color: var(--topbar-text);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .command-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
        }

        .update-status {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--topbar-muted);
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.16s ease;
        }

        .update-status.visible {
            opacity: 1;
        }

        .icon-button {
            display: grid;
            place-items: center;
            width: 32px;
            min-width: 32px;
            padding: 0;
            font-size: 16px;
        }

        .support-button {
            width: auto;
            padding: 0 9px;
            font-size: 12px;
            font-weight: 700;
        }

        .dropdown-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .dropdown-menu {
            position: absolute;
            top: 44px;
            min-width: 230px;
            padding: 5px;
            border: 1px solid var(--menu-border);
            border-radius: 6px;
            background: var(--menu-bg);
            box-shadow: 0 12px 30px var(--menu-shadow);
            pointer-events: auto;
        }

        .dropdown-menu[hidden] {
            display: none;
        }

        .menu-item {
            display: grid;
            grid-template-columns: 18px minmax(0, 1fr);
            align-items: center;
            gap: 8px;
            width: 100%;
            min-height: 30px;
            padding: 5px 9px;
            border-radius: 4px;
            background: transparent;
            color: var(--topbar-text);
            text-align: left;
            font-size: 13px;
        }

        .menu-item:hover,
        .menu-item:focus {
            outline: 0;
            background: #04395e;
            color: #ffffff;
        }

        .menu-item.active {
            background: var(--topbar-active);
            color: #ffffff;
        }

        .menu-item-check {
            color: #89d185;
            font-weight: 800;
        }

        .menu-separator {
            height: 1px;
            margin: 5px 6px;
            background: var(--menu-border);
        }

        @media (max-width: 900px) {
            .topbar {
                grid-template-columns: auto auto minmax(120px, 1fr) auto;
                gap: 6px;
            }

            .brand-name {
                display: none;
            }

            .version-pill {
                display: none;
            }

            .menu-trigger {
                padding: 0 7px;
            }

            .update-status {
                display: none;
            }

            .support-button {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="drag-region"></div>

    <div class="topbar">
        <div class="brand" title="Recursos Digitales SEA">
            <span class="brand-mark">R</span>
            <span class="brand-name">Recursos Digitales SEA</span>
            <span id="version-badge" class="version-pill">v...</span>
        </div>

        <nav id="menu-bar" class="menu-bar" aria-label="Menú principal"></nav>

        <div class="command-pill" title="Página actual">
            <span id="active-page-label" class="command-label">Plataforma Digital</span>
        </div>

        <div class="actions">
            <span id="update-status" class="update-status" aria-live="polite"></span>
            <button id="support-button" class="icon-button support-button" type="button" title="Soporte TI">Soporte TI</button>
            <button id="reload-button" class="icon-button" type="button" title="Recargar página" aria-label="Recargar página">↻</button>
        </div>
    </div>

    <div id="dropdown-layer" class="dropdown-layer">
        <div id="dropdown-menu" class="dropdown-menu" hidden></div>
    </div>

    <script>
        const MENU_GROUPS = [
            {
                label: 'Recursos',
                items: [
                    {
                        type: 'navigate',
                        label: 'SEA Guanajuato',
                        url: 'https://sistemaestatalanticorrupcion.guanajuato.gob.mx/'
                    },
                    {
                        type: 'navigate',
                        label: 'SESEA Guanajuato',
                        url: 'https://seseaguanajuato.org/'
                    },
                    {
                        type: 'navigate',
                        label: 'Portal Público',
                        url: 'https://publico.seseaguanajuato.org/'
                    }
                ]
            },
            {
                label: 'Sistemas',
                items: [
                    {
                        type: 'navigate',
                        label: 'Plataforma Digital',
                        url: 'https://plataformadigital.guanajuato.gob.mx/'
                    },
                    {
                        type: 'navigate',
                        label: 'Intranet SESEA',
                        url: 'https://intranet.seseaguanajuato.org/'
                    }
                ]
            },
            {
                label: 'Soporte',
                items: [
                    {
                        type: 'navigate',
                        label: 'Mesa de Ayuda SEA',
                        url: 'https://sistemaestatalanticorrupcion.guanajuato.gob.mx/mesa-de-ayuda/'
                    },
                    {
                        type: 'separator'
                    },
                    {
                        type: 'action',
                        label: 'Abrir Soporte TI',
                        action: 'open-support'
                    }
                ]
            },
            {
                label: 'Actualización',
                items: [
                    {
                        type: 'action',
                        label: 'Buscar actualización',
                        action: 'check-updates'
                    }
                ]
            }
        ];

        const menuBar = document.getElementById('menu-bar');
        const dropdownMenu = document.getElementById('dropdown-menu');
        const activePageLabel = document.getElementById('active-page-label');
        let activeUrl = '';
        let openMenuIndex = null;

        const allNavigationItems = () => MENU_GROUPS
            .flatMap(group => group.items)
            .filter(item => item.type === 'navigate');

        const findBestNavItem = (url) => {
            let bestMatch = null;
            let longestLength = 0;

            allNavigationItems().forEach(item => {
                if (url && url.startsWith(item.url) && item.url.length > longestLength) {
                    bestMatch = item;
                    longestLength = item.url.length;
                }
            });

            return bestMatch;
        };

        const closeMenu = () => {
            openMenuIndex = null;
            dropdownMenu.hidden = true;
            dropdownMenu.innerHTML = '';
            document.body.classList.remove('menu-open');
            window.api.setNavbarHeight(50);
            document.querySelectorAll('.menu-trigger').forEach(button => {
                button.classList.remove('open');
                button.setAttribute('aria-expanded', 'false');
            });
        };

        const showUpdateStatus = (status) => {
            const updateStatus = document.getElementById('update-status');

            if (!status || !status.message) return;

            updateStatus.textContent = status.message;
            updateStatus.classList.add('visible');

            if (!['checking', 'downloading'].includes(status.status)) {
                setTimeout(() => {
                    updateStatus.classList.remove('visible');
                }, 5000);
            }
        };

        const checkForUpdates = async () => {
            showUpdateStatus({
                status: 'checking',
                message: 'Buscando actualizaciones...'
            });

            const status = await window.api.checkForUpdates();
            showUpdateStatus(status);
        };

        const runAction = (action) => {
            if (action === 'open-support') {
                window.api.openTiSupport();
                return;
            }

            if (action === 'check-updates') {
                checkForUpdates();
            }
        };

        const navigate = (item) => {
            activeUrl = item.url;
            activePageLabel.textContent = item.label;
            window.api.navigate(item.url);
        };

        const renderDropdown = (groupIndex, triggerButton) => {
            const group = MENU_GROUPS[groupIndex];
            dropdownMenu.innerHTML = '';

            group.items.forEach(item => {
                if (item.type === 'separator') {
                    const separator = document.createElement('div');
                    separator.className = 'menu-separator';
                    dropdownMenu.appendChild(separator);
                    return;
                }

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'menu-item';

                const isActive = item.type === 'navigate'
                    && findBestNavItem(activeUrl) === item;
                if (isActive) button.classList.add('active');

                const check = document.createElement('span');
                check.className = 'menu-item-check';
                check.textContent = isActive ? '✓' : '';

                const label = document.createElement('span');
                label.textContent = item.label;

                button.append(check, label);
                button.addEventListener('click', () => {
                    closeMenu();
                    if (item.type === 'navigate') {
                        navigate(item);
                    } else {
                        runAction(item.action);
                    }
                });

                dropdownMenu.appendChild(button);
            });

            const bounds = triggerButton.getBoundingClientRect();
            dropdownMenu.style.left = `${Math.max(8, Math.min(bounds.left, window.innerWidth - 250))}px`;
            dropdownMenu.hidden = false;
            document.body.classList.add('menu-open');
            window.api.setNavbarHeight(260);
            openMenuIndex = groupIndex;
            triggerButton.classList.add('open');
            triggerButton.setAttribute('aria-expanded', 'true');
        };

        const toggleMenu = (groupIndex, triggerButton) => {
            const isSameMenu = openMenuIndex === groupIndex;
            closeMenu();
            if (!isSameMenu) {
                renderDropdown(groupIndex, triggerButton);
            }
        };

        const renderMenuBar = () => {
            menuBar.innerHTML = '';

            MENU_GROUPS.forEach((group, groupIndex) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'menu-trigger';
                button.textContent = group.label;
                button.setAttribute('aria-haspopup', 'menu');
                button.setAttribute('aria-expanded', 'false');
                button.addEventListener('click', event => {
                    event.stopPropagation();
                    toggleMenu(groupIndex, button);
                });
                menuBar.appendChild(button);
            });
        };

        const setActiveByUrl = (url) => {
            activeUrl = url || '';
            const activeItem = findBestNavItem(activeUrl);
            activePageLabel.textContent = activeItem ? activeItem.label : 'Página actual';
        };

        renderMenuBar();

        document.getElementById('support-button').addEventListener('click', () => {
            window.api.openTiSupport();
        });
        document.getElementById('reload-button').addEventListener('click', () => {
            window.api.reload();
        });

        document.addEventListener('click', event => {
            if (!dropdownMenu.hidden && !dropdownMenu.contains(event.target)) {
                closeMenu();
            }
        });

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') {
                closeMenu();
            }
        });

        window.api.getLastUrl().then(setActiveByUrl);

        window.api.getAppVersion().then(version => {
            if (!version) return;
            document.title = `Recursos Digitales SEA v${version}`;
            document.getElementById('version-badge').textContent = `v${version}`;
        });

        window.api.onUpdateStatus(showUpdateStatus);
    </script>
</body>

</html>
