<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <style>
        /* ================================= */
        /* CURSOR GLOBAL */
        /* ================================= */

        html,
        body,
        button,
        .nav-container,
        * {
            cursor:
                pointer;
        }

        body {
            margin: 0;
            padding: 0;

            background-color: #387c92;
            transition: background-color 0.3s ease;

            font-family:
                'Segoe UI',
                Roboto,
                Helvetica,
                Arial,
                sans-serif;

            display: flex;
            align-items: center;

            height: 50px;

            overflow: hidden;

            border-bottom: 1px solid #333;

            user-select: none;

            -webkit-user-select: none;
        }

        /* ================================= */
        /* REGIÓN DRAGGABLE */
        /* ================================= */

        .drag-region {
            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 50px;

            -webkit-app-region: drag;

            z-index: 1;
        }

        /* ================================= */
        /* NAV */
        /* ================================= */

        .nav-container {
            position: relative;

            z-index: 2;

            display: flex;

            width: 100%;
            height: 100%;

            padding: 0 10px;

            gap: 5px;

            align-items: center;

            -webkit-app-region: no-drag;
        }

        button {
            background: transparent;

            border: none;

            color: var(--navbar-text-color, #cccccc);

            font-size: 13px;
            font-weight: 500;

            padding: 8px 12px;

            border-radius: 6px;

            transition:
                all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);

            height: 36px;

            position: relative;

            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ================================= */
        /* EFECTOS BOTONES */
        /* ================================= */

        button::after {
            content: '';

            position: absolute;

            top: 0;
            left: -150%;

            width: 50%;
            height: 100%;

            background: linear-gradient(to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.25) 50%,
                    rgba(255, 255, 255, 0) 100%);

            transform: skewX(-25deg);

            pointer-events: none;
        }

        button:hover {
            background-color: #59c4e7;
            color: #ffffff;

            box-shadow:
                0 0 12px rgba(0, 120, 212, 0.3);

            transform:
                translateY(-1px) scale(1.02);
        }

        button:hover::after {
            left: 150%;

            transition:
                left 0.6s cubic-bezier(0.25,
                    0.8,
                    0.25,
                    1);
        }

        /* ================================= */
        /* BOTÓN ACTIVO */
        /* ================================= */

        button.active {
            background: #17343d;

            background-size: 300% 300%;

            animation:
                activeGradient 4s ease infinite;

            color: var(--active-button-text-color, #ffffff);

            box-shadow:
                0 4px 14px rgba(0, 120, 212, 0.4);

            font-weight: 600;
        }

       

        .spacer {
            flex-grow: 1;
        }

        .reload-btn {
            background-color: #c3d8de;
            box-shadow:
                0 0 10px rgba(255, 255, 255, 0.1);
        }

        .reload-btn:hover {
            background-color: #444;

            box-shadow:
                0 0 10px rgba(255, 255, 255, 0.1);
        }

        .support-btn {
            background-color:
                #92387c;

            border:
                1px solid rgba(0, 120, 212, 0.4);

            color: #ffffff;
        }

        .support-btn:hover {
            background-color: #7c9238;

            color: #ffffff;

            box-shadow:
                0 0 14px rgba(0, 120, 212, 0.6);
        }

        /* ================================= */
        /* ANIMACIONES */
        /* ================================= */

        @keyframes activeGradient {

            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes pulseDot {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Región draggable -->
    <div class="drag-region"></div>

    <div class="nav-container">

        <button onclick="navigate('https://sistemaestatalanticorrupcion.guanajuato.gob.mx/', this)">
            SEA Guanajuato
        </button>

        <button onclick="navigate('https://sistemaestatalanticorrupcion.guanajuato.gob.mx/mesa-de-ayuda/', this)">
            Mesa de Ayuda SEA
        </button>

        <button onclick="navigate('https://seseaguanajuato.org/', this)">
            SESEA Guanajuato
        </button>

        <button onclick="navigate('https://publico.seseaguanajuato.org/', this)">
            Portal Público
        </button>

        <button onclick="navigate('https://plataformadigital.guanajuato.gob.mx/', this)" class="active">

            Plataforma Digital
        </button>

        <button onclick="navigate('https://intranet.seseaguanajuato.org/', this)">
            Intranet SESEA
        </button>

        

        <div class="spacer"></div>
        <button class="support-btn" onclick="openTiSupport()">
            Soporte TI
        </button>
        <button class="reload-btn" onclick="reloadView()">

            🔄
        </button>

    </div>

    <script>

        function navigate(url, btn) {

            document
                .querySelectorAll('button')
                .forEach(b => b.classList.remove('active'));

            if (btn) {
                btn.classList.add('active');
            }

            window.api.navigate(url);
        }

        function reloadView() {
            window.api.reload();
        }

        function openTiSupport() {
            window.api.openTiSupport();
        }

        window.api.onNavbarThemeColor(color => {
            if (!color) return;
            document.body.style.backgroundColor = color;
        });

        /* ================================= */
        /* BOTÓN ACTIVO */
        /* ================================= */

        const parseColor = (value) => {
            if (!value || typeof value !== 'string') return null;
            value = value.trim();

            const rgbMatch = value.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/i);
            if (rgbMatch) {
                return {
                    r: Number(rgbMatch[1]),
                    g: Number(rgbMatch[2]),
                    b: Number(rgbMatch[3])
                };
            }

            const hexMatch = value.match(/^#([a-f0-9]{3}|[a-f0-9]{6})$/i);
            if (hexMatch) {
                let hex = hexMatch[1];
                if (hex.length === 3) {
                    hex = hex.split('').map(c => c + c).join('');
                }
                return {
                    r: parseInt(hex.substr(0, 2), 16),
                    g: parseInt(hex.substr(2, 2), 16),
                    b: parseInt(hex.substr(4, 2), 16)
                };
            }

            return null;
        };

        const contrastColor = (background) => {
            const rgb = parseColor(background);
            if (!rgb) return '#ffffff';

            const normalize = (value) => {
                const channel = value / 255;
                return channel <= 0.03928
                    ? channel / 12.92
                    : Math.pow((channel + 0.055) / 1.055, 2.4);
            };

            const lum = 0.2126 * normalize(rgb.r) + 0.7152 * normalize(rgb.g) + 0.0722 * normalize(rgb.b);
            return lum > 0.55 ? '#111111' : '#ffffff';
        };

        const contrastRatio = (bg, fg) => {
            const rgbBg = parseColor(bg);
            const rgbFg = parseColor(fg);
            if (!rgbBg || !rgbFg) return 0;

            const luminance = (rgb) => {
                const normalize = (value) => {
                    const channel = value / 255;
                    return channel <= 0.03928
                        ? channel / 12.92
                        : Math.pow((channel + 0.055) / 1.055, 2.4);
                };
                return 0.2126 * normalize(rgb.r) + 0.7152 * normalize(rgb.g) + 0.0722 * normalize(rgb.b);
            };

            const L1 = luminance(rgbBg);
            const L2 = luminance(rgbFg);
            return (Math.max(L1, L2) + 0.05) / (Math.min(L1, L2) + 0.05);
        };

        const updateButtonTextColors = () => {
            const navbarBg = document.body.style.backgroundColor || window.getComputedStyle(document.body).backgroundColor;
            const baseText = contrastColor(navbarBg);
            document.documentElement.style.setProperty('--navbar-text-color', baseText);

            const activeButton = document.querySelector('button.active');
            if (activeButton) {
                const activeBg = window.getComputedStyle(activeButton).backgroundColor;
                let activeText = contrastColor(activeBg || navbarBg);
                if (contrastRatio(activeBg || navbarBg, activeText) < 4.5) {
                    activeText = contrastColor(navbarBg);
                }
                document.documentElement.style.setProperty('--active-button-text-color', activeText);
            }
        };

        window.api.onNavbarThemeColor(color => {
            if (!color) return;
            document.body.style.backgroundColor = color;
            updateButtonTextColors();
        });

        window.api.getLastUrl().then(url => {

            if (!url) return;

            let bestMatch = null;

            let longestLength = 0;

            document
                .querySelectorAll('button')
                .forEach(b => {

                    b.classList.remove('active');

                    const onclickAttr =
                        b.getAttribute('onclick');

                    if (!onclickAttr) return;

                    const match =
                        onclickAttr.match(
                            /navigate\('([^']+)'/
                        );

                    if (match && match[1]) {

                        const btnUrl = match[1];

                        if (
                            url.startsWith(btnUrl) &&
                            btnUrl.length > longestLength
                        ) {
                            bestMatch = b;
                            longestLength = btnUrl.length;
                        }
                    }
                });

            if (bestMatch) {
                bestMatch.classList.add('active');
            }

            updateButtonTextColors();
        });

    </script>

</body>

</html>
